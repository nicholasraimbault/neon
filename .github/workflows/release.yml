name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app and DMG
        run: bash app/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            build/Neon-*.dmg

  linux-tray:
    name: Linux tray app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev gcc pkg-config

      - name: Build tray app
        working-directory: linux-app
        run: |
          go mod tidy
          go build -o ../build/neon-tray .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-tray
          path: build/neon-tray

  linux-deb:
    name: Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev gcc pkg-config

      - name: Build .deb
        run: |
          cd linux-app && go mod tidy && go build -o ../build/neon-tray . && cd ..
          bash packaging/deb/build-deb.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: packaging/deb/neon-drm_*.deb

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [macos-app, linux-tray, linux-deb]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            artifacts/macos/*.dmg \
            artifacts/linux-tray/neon-tray \
            artifacts/linux-deb/*.deb
